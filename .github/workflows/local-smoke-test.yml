name: Local Smoke Test (PostgreSQL)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-local:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_test
      PGSSLMODE: disable
      LOCAL_API_BASE_URL: http://localhost:3000
      SMOKE_USER_EMAIL: smoke-test@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Start backend
        run: npm run dev > server.log 2>&1 &

      - name: Wait for backend health
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:3000/api/health > /dev/null; do sleep 2; done'

      - name: Run local smoke tests
        run: npm run smoke:local

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-smoke-server-log
          path: server.log
