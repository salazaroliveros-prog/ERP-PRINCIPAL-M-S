name: Sync Firebase Backend (Firestore + Storage)

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firestore.indexes.json
      - storage.rules
      - firebase.json
      - .firebaserc
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate Firebase Service Account
        shell: bash
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CREDENTIALS }}' > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore and Storage Rules
        run: firebase deploy --project ${{ secrets.FIREBASE_PROJECT_ID }} --only firestore,storage --non-interactive
