name: Verify Production API

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  verify-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify deployed API and CORS
        env:
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          FRONTEND_ORIGIN: https://salazaroliveros-prog.github.io
        run: npm run verify:prod
